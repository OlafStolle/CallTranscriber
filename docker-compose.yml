services:
  backend:
    build: ./backend
    expose:
      - "8000"
    env_file:
      - ./backend/.env
    restart: unless-stopped
    networks:
      - coolify
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.calltrans-api.rule=Host(`calltrans-api.ai-crafters.io`)"
      - "traefik.http.routers.calltrans-api.entrypoints=http"
      - "traefik.http.routers.calltrans-api.middlewares=redirect-to-https"
      - "traefik.http.routers.calltrans-api-secure.rule=Host(`calltrans-api.ai-crafters.io`)"
      - "traefik.http.routers.calltrans-api-secure.entrypoints=https"
      - "traefik.http.routers.calltrans-api-secure.tls=true"
      - "traefik.http.routers.calltrans-api-secure.tls.certresolver=letsencrypt"
      - "traefik.http.services.calltrans-api.loadbalancer.server.port=8000"
      - "traefik.docker.network=coolify"

  web:
    build: ./web
    expose:
      - "3000"
    env_file:
      - ./web/.env
    restart: unless-stopped
    networks:
      - coolify
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.calltrans-web.rule=Host(`calltrans.ai-crafters.io`)"
      - "traefik.http.routers.calltrans-web.entrypoints=http"
      - "traefik.http.routers.calltrans-web.middlewares=redirect-to-https"
      - "traefik.http.routers.calltrans-web-secure.rule=Host(`calltrans.ai-crafters.io`)"
      - "traefik.http.routers.calltrans-web-secure.entrypoints=https"
      - "traefik.http.routers.calltrans-web-secure.tls=true"
      - "traefik.http.routers.calltrans-web-secure.tls.certresolver=letsencrypt"
      - "traefik.http.services.calltrans-web.loadbalancer.server.port=3000"
      - "traefik.docker.network=coolify"

networks:
  coolify:
    external: true
