services:
  backend:
    build: ./backend
    expose:
      - "8000"
    env_file:
      - ./backend/.env
    restart: unless-stopped
    networks:
      - coolify
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.calltrans-api.rule=Host(`calltrans-api.72.60.181.127.sslip.io`)"
      - "traefik.http.routers.calltrans-api.entrypoints=http"
      - "traefik.http.services.calltrans-api.loadbalancer.server.port=8000"
      - "traefik.docker.network=coolify"

  web:
    build: ./web
    expose:
      - "3000"
    env_file:
      - ./web/.env
    restart: unless-stopped
    networks:
      - coolify
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.calltrans-web.rule=Host(`calltrans-web.72.60.181.127.sslip.io`)"
      - "traefik.http.routers.calltrans-web.entrypoints=http"
      - "traefik.http.services.calltrans-web.loadbalancer.server.port=3000"
      - "traefik.docker.network=coolify"

networks:
  coolify:
    external: true
