services:
  backend:
    build: ./backend
    expose:
      - "8000"
    env_file:
      - ./backend/.env
    restart: unless-stopped
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.calltrans-api.rule=Host(`transcriber-api.aicraftors.com`)"
      - "traefik.http.routers.calltrans-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.calltrans-api.loadbalancer.server.port=8000"
      - "traefik.docker.network=traefik"

  web:
    build: ./web
    expose:
      - "3000"
    env_file:
      - ./web/.env
    restart: unless-stopped
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.calltrans-web.rule=Host(`transcriber.aicraftors.com`)"
      - "traefik.http.routers.calltrans-web.tls.certresolver=letsencrypt"
      - "traefik.http.services.calltrans-web.loadbalancer.server.port=3000"
      - "traefik.docker.network=traefik"

networks:
  traefik:
    external: true
