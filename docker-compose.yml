services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.call-transcriber.rule=Host(`transcriber-api.yourdomain.com`)"
      - "traefik.http.routers.call-transcriber.tls.certresolver=letsencrypt"
